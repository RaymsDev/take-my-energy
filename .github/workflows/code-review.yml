name: Code Quality & Linting

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality Checks
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint 2>/dev/null || echo "ESLint not configured"
        continue-on-error: true

      - name: Run Prettier check
        run: npx prettier --check . 2>/dev/null || echo "Prettier not configured"
        continue-on-error: true

      - name: TypeScript type check
        run: npm run type-check 2>/dev/null || npx tsc --noEmit 2>/dev/null || echo "TypeScript check skipped"
        continue-on-error: true

      - name: Run tests
        run: npm test 2>/dev/null || echo "Tests not configured"
        continue-on-error: true
