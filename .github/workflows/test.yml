name: Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run all tests

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Jest tests (api + dto)
        run: npm exec nx run-many -- --target=test --projects=api,shared-dto --ci

      - name: Angular tests (Karma headless)
        run: npm exec nx test fiveOfHeart -- --browsers=ChromeHeadless --watch=false
